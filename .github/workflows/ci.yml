name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Node 20)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: node --check src/index.js

      # vitest.config.js thresholds: lines/stmts/funcs/branches >= 85%
      # vitest exits non-zero if any threshold is not met -- CI fails automatically
      - name: Run tests with coverage (fail if < 85%)
        run: npm run coverage
